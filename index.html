<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suren | High-End Digital Dictionary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            /* Solar Amber Edition */
            --bg: #030303;
            --surface: rgba(20, 20, 20, 0.6);
            --accent: #ff8c00;
            --accent-glow: rgba(255, 140, 0, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border: rgba(255, 140, 0, 0.2);
            --card-blur: 15px;
            --shake-intensity: 5px;
        }

        body.liquid-theme {
            /* Liquid Blue Edition */
            --bg: #010409;
            --surface: rgba(15, 23, 42, 0.3);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --text-primary: #f1f5f9;
            --text-secondary: #64748b;
            --border: rgba(56, 189, 248, 0.2);
            --card-blur: 30px;
            --shake-intensity: 7px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Ambient Background Light */
        .ambient-light {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% -10%, var(--accent-glow), transparent 70%);
            z-index: -1;
            pointer-events: none;
            transition: background 1.2s ease;
        }

        /* Intro Overlay */
        #intro-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 5000;
            pointer-events: none;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.5s;
        }

        .logo-container {
            display: flex;
            align-items: baseline;
            perspective: 1500px;
        }

        .suren-text {
            font-size: clamp(4rem, 15vw, 9rem);
            font-weight: 800;
            letter-spacing: -6px;
            color: var(--text-primary);
            opacity: 0;
            display: inline-block;
            transform-origin: center;
            will-change: transform, opacity, filter;
        }

        @keyframes surenIntro {
            0% { 
                transform: translateX(-150vw) skewX(-25deg) scaleX(1.8); 
                opacity: 0; 
                filter: blur(30px);
            }
            60% { 
                transform: translateX(5vw) skewX(-25deg) scaleX(1.1); 
                opacity: 1; 
                filter: blur(0px);
            }
            80% { 
                transform: translateX(-2vw) skewX(-25deg) scaleX(1); 
            }
            100% { 
                transform: translateX(0) skewX(-20deg) scaleX(1); 
                opacity: 1; 
                filter: blur(0px);
            }
        }

        @keyframes elasticWobble {
            0% { transform: skewX(-20deg) scale(1); }
            20% { transform: skewX(-24deg) scale(1.02) rotate(-1deg); }
            40% { transform: skewX(-16deg) scale(0.98) rotate(1deg); }
            60% { transform: skewX(-21deg) scale(1.01) rotate(-0.5deg); }
            80% { transform: skewX(-19deg) scale(0.99) rotate(0.2deg); }
            100% { transform: skewX(-20deg) scale(1) rotate(0deg); }
        }

        .logo-dot {
            font-size: clamp(4rem, 15vw, 9rem);
            font-weight: 800;
            color: var(--accent);
            opacity: 0;
            display: inline-block;
            text-shadow: 0 0 40px var(--accent-glow);
            will-change: transform, opacity;
        }

        @keyframes dotGravity {
            0% { transform: translateY(-120vh); opacity: 0; }
            60% { transform: translateY(0); opacity: 1; }
            80% { transform: translateY(-30px); }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes impactShake {
            0% { transform: translate(0, 0); }
            15% { transform: translate(calc(var(--shake-intensity) * -1), var(--shake-intensity)); }
            30% { transform: translate(var(--shake-intensity), calc(var(--shake-intensity) * -1)); }
            45% { transform: translate(calc(var(--shake-intensity) * -0.5), var(--shake-intensity)); }
            60% { transform: translate(var(--shake-intensity), calc(var(--shake-intensity) * -0.5)); }
            100% { transform: translate(0, 0); }
        }

        .animate-suren { animation: surenIntro 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards, elasticWobble 2s cubic-bezier(0.45, 0, 0.55, 1) 1.8s forwards; }
        .animate-dot { animation: dotGravity 0.9s cubic-bezier(0.47, 0, 0.745, 0.715) forwards; }
        .shaking { animation: impactShake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }

        /* UI Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 6rem 2rem;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1) 4s;
        }

        .container.active { opacity: 1; transform: translateY(0); }

        /* Theme Selection */
        .theme-nav {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 6000;
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 50px;
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            opacity: 0;
            transition: opacity 1s ease 4.5s;
        }

        .t-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: transparent;
            color: var(--text-secondary);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .t-btn.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 25px var(--accent-glow);
        }

        /* Card Grid */
        #word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2.5rem;
            margin-top: 4rem;
        }

        .word-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 3rem;
            backdrop-filter: blur(var(--card-blur));
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .word-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.6);
        }

        .word-card h2 { font-size: 2.5rem; color: var(--accent); margin-bottom: 1.5rem; letter-spacing: -1px; }
        .word-card p { font-size: 1.1rem; line-height: 1.8; opacity: 0.85; margin-bottom: 2rem; }

        .example-box {
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        @media (max-width: 768px) {
            .container { padding: 4rem 1.5rem; }
            .theme-nav { top: 1rem; right: 1rem; }
        }
    </style>
</head>
<body onload="startIntro()">

    <div class="ambient-light"></div>

    <div id="intro-overlay">
        <div class="logo-container">
            <span id="txt-suren" class="suren-text">SUREN</span>
            <span id="dot-suren" class="logo-dot">.</span>
        </div>
    </div>

    <nav id="theme-nav" class="theme-nav">
        <button id="btn-amber" class="t-btn active" onclick="changeTheme('amber')">Solar Amber</button>
        <button id="btn-blue" class="t-btn" onclick="changeTheme('blue')">Liquid Blue</button>
    </nav>

    <div id="main-ui" class="container">
        <header style="text-align: center; margin-bottom: 4rem;">
            <p style="text-transform: uppercase; letter-spacing: 4px; color: var(--accent); font-weight: 800; font-size: 0.9rem;">Modern Kavramlar Atlası</p>
        </header>
        <div id="word-grid">
            <!-- JS will populate -->
        </div>
    </div>

    <script>
        const GIST_URL = 'https://gist.githubusercontent.com/achickonweb/83412cf9196a8cc0c4d57cd2e08d5e21/raw/cdd3a7b782991f1880af5c2f77d3d4103bad0cb9/gistfile1.txt';
        
        // --- CINEMATIC SOUND ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSynth(type) {
            if (!audioCtx || audioCtx.state === 'suspended') return;

            const now = audioCtx.currentTime;

            if (type === 'whoosh') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(40, now);
                osc.frequency.exponentialRampToValueAtTime(120, now + 1.2);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.4, now + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.8);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(now + 2);
            }

            if (type === 'impact') {
                const bass = audioCtx.createOscillator();
                const bGain = audioCtx.createGain();
                bass.frequency.setValueAtTime(70, now);
                bass.frequency.exponentialRampToValueAtTime(30, now + 0.4);
                bGain.gain.setValueAtTime(0.6, now);
                bGain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                bass.connect(bGain);
                bGain.connect(audioCtx.destination);
                bass.start();
                bass.stop(now + 0.7);

                const chime = audioCtx.createOscillator();
                const cGain = audioCtx.createGain();
                chime.type = 'triangle';
                chime.frequency.setValueAtTime(2200, now);
                cGain.gain.setValueAtTime(0.15, now);
                cGain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                chime.connect(cGain);
                cGain.connect(audioCtx.destination);
                chime.start();
                chime.stop(now + 1.5);
            }

            if (type === 'wobble') {
                const wobble = audioCtx.createOscillator();
                const wGain = audioCtx.createGain();
                wobble.type = 'sine';
                wobble.frequency.setValueAtTime(150, now);
                wGain.gain.setValueAtTime(0.03, now);
                wGain.gain.linearRampToValueAtTime(0, now + 0.8);
                wobble.connect(wGain);
                wGain.connect(audioCtx.destination);
                wobble.start();
                wobble.stop(now + 0.8);
            }
        }

        // --- DIRECT START SEQUENCE ---
        function startIntro() {
            // Audio Context'i sessizce hazırlamaya çalış
            window.addEventListener('mousedown', initAudio, { once: true });
            window.addEventListener('keydown', initAudio, { once: true });

            // Phase 1: Text Entrance
            setTimeout(() => {
                playSynth('whoosh');
                document.getElementById('txt-suren').classList.add('animate-suren');
            }, 300);

            // Phase 1.5: Wobble Sound
            setTimeout(() => playSynth('wobble'), 2100);

            // Phase 2: Dot Gravity
            setTimeout(() => {
                document.getElementById('dot-suren').classList.add('animate-dot');
            }, 2800);

            // Phase 3: Impact & Shake
            setTimeout(() => {
                playSynth('impact');
                document.body.classList.add('shaking');
                setTimeout(() => document.body.classList.remove('shaking'), 500);
            }, 3450);

            // Phase 4: UI Reveal
            setTimeout(() => {
                document.getElementById('intro-overlay').style.opacity = '0';
                document.getElementById('main-ui').classList.add('active');
                document.getElementById('theme-nav').style.opacity = '1';
                setTimeout(() => document.getElementById('intro-overlay').remove(), 1200);
            }, 4000);
        }

        // --- CORE LOGIC ---
        function changeTheme(t) {
            if (t === 'blue') {
                document.body.classList.add('liquid-theme');
                document.getElementById('btn-blue').classList.add('active');
                document.getElementById('btn-amber').classList.remove('active');
            } else {
                document.body.classList.remove('liquid-theme');
                document.getElementById('btn-amber').classList.add('active');
                document.getElementById('btn-blue').classList.remove('active');
            }
        }

        async function loadData() {
            try {
                const res = await fetch(GIST_URL);
                if (!res.ok) throw new Error('Fetch Error');
                const data = await res.json();
                const grid = document.getElementById('word-grid');
                grid.innerHTML = data.words.map(w => `
                    <div class="word-card">
                        <h2>${w.word}</h2>
                        <p>${w.meaning}</p>
                        <div class="example-box">
                            "${w.example}"
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('word-grid').innerHTML = '<div style="color:red">Veritabanı bağlantısı kurulamadı.</div>';
            }
        }

        // Kısayol: Ctrl + Alt + Shift + F12 + F11
        let keysPressed = {};
        window.addEventListener('keydown', (e) => {
            keysPressed[e.key] = true;
            if (keysPressed['Control'] && keysPressed['Alt'] && keysPressed['Shift'] && keysPressed['F12'] && keysPressed['F11']) {
                window.location.href = "about:blank";
            }
        });
        window.addEventListener('keyup', (e) => delete keysPressed[e.key]);

        loadData();
    </script>
</body>
</html>
