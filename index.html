<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suren | Dijital Sözlük</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            /* Solar Amber Edition */
            --bg: #050505;
            --surface: #111111;
            --accent: #ff8c00;
            --accent-glow: rgba(255, 140, 0, 0.25);
            --text-primary: #fcfcfc;
            --text-secondary: #94a3b8;
            --border: #222222;
            --card-blur: 0px;
            --impact-intensity: 6px;
        }

        body.liquid-theme {
            /* Liquid Glass Blue Edition */
            --bg: #030712;
            --surface: rgba(255, 255, 255, 0.03);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --card-blur: 25px;
            --impact-intensity: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1), border 0.6s ease, color 0.6s ease;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            perspective: 1000px; /* Derinlik efekti için gerekli */
        }

        /* Arkaplan Izgarası */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            opacity: 0.3;
        }

        .glow-sphere {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -300px;
            right: -200px;
            z-index: -1;
            pointer-events: none;
            transition: all 1s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 5rem 2rem;
            position: relative;
        }

        /* Tema Seçici */
        .theme-switcher {
            position: fixed;
            top: 2rem;
            right: 2rem;
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.4rem;
            border-radius: 100px;
            backdrop-filter: blur(20px);
            z-index: 1000;
        }

        .theme-btn {
            padding: 0.7rem 1.4rem;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.75rem;
            background: transparent;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .theme-btn.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* --- INTRO ANIMASYONLARI --- */
        
        @keyframes textSlideIn {
            0% { 
                transform: translateX(-50vw) skewX(-20deg) scaleX(1.5); 
                opacity: 0; 
                filter: blur(20px);
            }
            100% { 
                transform: translateX(0) skewX(-20deg) scaleX(1); 
                opacity: 1; 
                filter: blur(0px);
            }
        }

        /* Bakış açısından gelme (Z-axis) animasyonu */
        @keyframes dotZoomIn {
            0% { 
                transform: translateZ(1000px) scale(15); 
                opacity: 0; 
                filter: blur(40px);
            }
            20% {
                opacity: 1;
            }
            100% { 
                transform: translateZ(0) scale(1); 
                opacity: 1; 
                filter: blur(0px);
            }
        }

        @keyframes impactShake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(calc(var(--impact-intensity) * -1), var(--impact-intensity)); }
            20%, 40%, 60%, 80% { transform: translate(var(--impact-intensity), calc(var(--impact-intensity) * -1)); }
        }

        @keyframes shockwave {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; border-width: 15px; }
            100% { transform: translate(-50%, -50%) scale(5); opacity: 0; border-width: 1px; }
        }

        @keyframes letterJump {
            0% { transform: translateY(0) skewX(-20deg); }
            50% { transform: translateY(-30px) skewX(-20deg); }
            100% { transform: translateY(0) skewX(-20deg); }
        }

        header {
            text-align: center;
            margin-bottom: 6rem;
            position: relative;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            transform-style: preserve-3d;
        }

        .logo {
            font-size: 7rem;
            font-weight: 800;
            letter-spacing: -6px;
            color: var(--text-primary);
            display: flex;
            align-items: baseline;
            position: relative;
            z-index: 5;
            transform-style: preserve-3d;
        }

        .logo-text {
            display: inline-block;
            transform: skewX(-20deg);
            opacity: 0;
            animation: textSlideIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: transform, opacity;
        }

        .logo-dot {
            display: inline-block;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
            opacity: 0;
            /* Nokta animasyonu: 2.4s bekleme ile arkadan öne fırlıyor */
            animation: dotZoomIn 0.5s cubic-bezier(0.165, 0.84, 0.44, 1) forwards 2.4s;
            will-change: transform, opacity, filter;
        }

        /* Şok Dalgası Elementi */
        .shockwave {
            position: absolute;
            top: 85%;
            left: 95%;
            width: 100px;
            height: 100px;
            border: 3px solid var(--accent);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 1;
        }

        /* Darbe anı sınıfları */
        .impact-active .shockwave {
            animation: shockwave 0.8s cubic-bezier(0.215, 0.61, 0.355, 1) forwards;
        }

        .impact-active .logo-text {
            /* Hem yerini koru hem zıpla */
            animation: textSlideIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards, 
                       letterJump 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.impact-shake .container {
            animation: impactShake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        header p {
            margin-top: 1rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.8s ease-out forwards 3.2s;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Grid Tasarımı */
        #dictionary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2.5rem;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards 3.6s;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.5);
        }

        .word-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .word-meaning {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .example-section {
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }

        .example-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 800;
            display: block;
            margin-bottom: 0.5rem;
        }

        .word-example {
            font-style: italic;
            color: var(--text-secondary);
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem;
            border: 1px dashed var(--border);
            border-radius: 28px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .logo { font-size: 4.5rem; letter-spacing: -3px; }
            .container { padding: 3rem 1.5rem; }
        }
    </style>
</head>
<body id="main-body">

    <div class="glow-sphere"></div>

    <div class="theme-switcher">
        <button id="amber-btn" class="theme-btn active" onclick="setTheme('amber')">Amber</button>
        <button id="blue-btn" class="theme-btn" onclick="setTheme('blue')">Liquid</button>
    </div>

    <div class="container">
        <header id="header-section">
            <div class="logo-container">
                <div class="logo" id="main-logo">
                    <span class="logo-text">SUREN</span><span class="logo-dot">.</span>
                </div>
                <div class="shockwave"></div>
            </div>
            <p>Akışkan bilgi, keskin keşif.</p>
        </header>

        <main id="dictionary-grid">
            <div class="status-msg">Protokoller yükleniyor...</div>
        </main>
    </div>

    <script>
        const grid = document.getElementById('dictionary-grid');
        const body = document.getElementById('main-body');
        const header = document.getElementById('header-section');
        const amberBtn = document.getElementById('amber-btn');
        const blueBtn = document.getElementById('blue-btn');

        const DATA_SOURCE = 'https://gist.githubusercontent.com/achickonweb/83412cf9196a8cc0c4d57cd2e08d5e21/raw/cdd3a7b782991f1880af5c2f77d3d4103bad0cb9/gistfile1.txt';

        function setTheme(theme) {
            if (theme === 'blue') {
                body.classList.add('liquid-theme');
                blueBtn.classList.add('active');
                amberBtn.classList.remove('active');
            } else {
                body.classList.remove('liquid-theme');
                amberBtn.classList.add('active');
                blueBtn.classList.remove('active');
            }
        }

        // IMPACT MOMENT: Nokta ekrana çarpıp yerine oturduğu an
        setTimeout(() => {
            body.classList.add('impact-shake');
            header.classList.add('impact-active');
            
            setTimeout(() => {
                body.classList.remove('impact-shake');
            }, 400);
        }, 2900); // 2.4s + 0.5s animasyon süresi civarı

        async function fetchSurenData() {
            try {
                const response = await fetch(DATA_SOURCE);
                if (!response.ok) throw new Error('Sunucu Hatası');
                const data = await response.json();
                renderDictionary(data.words);
            } catch (err) {
                grid.innerHTML = `<div class="status-msg" style="color: #ff4444;">Veri akışı kesildi. Bağlantıyı kontrol et kanka.</div>`;
            }
        }

        function renderDictionary(words) {
            grid.innerHTML = '';
            words.forEach((item, index) => {
                const card = document.createElement('article');
                card.className = 'card';
                card.style.animation = `fadeIn 0.8s ease-out forwards ${3.6 + (index * 0.1)}s`;
                card.innerHTML = `
                    <h2 class="word-title">${item.word}</h2>
                    <p class="word-meaning">${item.meaning}</p>
                    <div class="example-section">
                        <span class="example-label">Senaryo</span>
                        <p class="word-example">"${item.example}"</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Kısayol: Ctrl + Alt + Shift + f12 + f11
        let keysActive = {};
        document.addEventListener('keydown', (e) => {
            keysActive[e.key] = true;
            if (keysActive['Control'] && keysActive['Alt'] && keysActive['Shift'] && keysActive['F12'] && keysActive['F11']) {
                window.location.href = "about:blank";
            }
        });
        document.addEventListener('keyup', (e) => delete keysActive[e.key]);

        fetchSurenData();
    </script>
</body>
</html>
