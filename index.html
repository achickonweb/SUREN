<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#070707">
<title>Suren · Dijital Sözlük</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   DESIGN TOKENS — AMBER (default dark)
══════════════════════════════════════ */
:root {
  --bg:           #070707;
  --bg2:          #0d0d0d;
  --surface:      rgba(255,255,255,0.034);
  --surface-hi:   rgba(255,255,255,0.065);
  --accent:       #f59e0b;
  --accent-h:     38;
  --accent-dim:   rgba(245,158,11,0.11);
  --accent-glow:  rgba(245,158,11,0.22);
  --success:      #22c55e;
  --danger:       #ef4444;
  --text:         #f0ece4;
  --text-2:       #64748b;
  --text-3:       #2a3340;
  --border:       rgba(255,255,255,0.07);
  --border-hi:    rgba(245,158,11,0.42);
  --r-card:       18px;
  --r-pill:       100px;
  --ease:         cubic-bezier(0.23,1,0.32,1);
  --shadow-card:  0 18px 48px -14px rgba(0,0,0,.7);
}
body.liquid {
  --bg:          #020c16;
  --bg2:         #040e1a;
  --accent:      #38bdf8;
  --accent-h:    200;
  --accent-dim:  rgba(56,189,248,0.1);
  --accent-glow: rgba(56,189,248,0.22);
  --border-hi:   rgba(56,189,248,0.42);
  --text:        #e4f2fb;
}
body.light {
  --bg:          #f5f2ed;
  --bg2:         #ede9e2;
  --surface:     rgba(0,0,0,0.042);
  --surface-hi:  rgba(0,0,0,0.07);
  --accent:      #d97706;
  --accent-h:    33;
  --accent-dim:  rgba(217,119,6,0.1);
  --accent-glow: rgba(217,119,6,0.25);
  --success:     #16a34a;
  --danger:      #dc2626;
  --text:        #1c1711;
  --text-2:      #6b7280;
  --text-3:      #b0a898;
  --border:      rgba(0,0,0,0.09);
  --border-hi:   rgba(217,119,6,0.5);
  --shadow-card: 0 8px 28px -8px rgba(0,0,0,.14);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .5s ease,color .5s ease;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  opacity:.28;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 55% at 50% 0%,black 30%,transparent 100%);
}

/* ══════════════════════════════════════
   AURORA
══════════════════════════════════════ */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);will-change:transform}
.o1{width:700px;height:500px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 65%);top:-200px;right:-150px;animation:d1 18s ease-in-out infinite alternate}
.o2{width:500px;height:400px;background:radial-gradient(circle,var(--accent-dim) 0%,transparent 65%);bottom:-100px;left:-100px;animation:d2 22s ease-in-out infinite alternate}
@keyframes d1{to{transform:translate(-60px,40px) scale(1.1)}}
@keyframes d2{to{transform:translate(50px,-50px) scale(.95)}}

/* ══════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════ */
#authScreen{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  padding:1.5rem;
}
#authScreen.hiding{
  animation:authHide .5s var(--ease) forwards;
  pointer-events:none;
}
@keyframes authHide{
  to{opacity:0;transform:scale(1.05)}
}
.auth-box{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:2.4rem 2rem;
  backdrop-filter:blur(28px) saturate(1.5);
  -webkit-backdrop-filter:blur(28px) saturate(1.5);
  box-shadow:0 40px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.06);
  animation:authIn .7s var(--ease) forwards;
}
@keyframes authIn{
  0%{opacity:0;transform:translateY(28px) scale(.97)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.auth-box::before{
  content:'';position:absolute;top:0;left:2rem;right:2rem;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  border-radius:100px;
}
.auth-logo{text-align:center;margin-bottom:1.85rem}
.auth-logo-text{
  font-family:'Syne',sans-serif;font-size:2.9rem;font-weight:800;
  letter-spacing:-.04em;line-height:1;
}
.auth-logo-dot{color:var(--accent)}
.auth-subtitle{
  font-size:.72rem;color:var(--text-2);letter-spacing:.16em;
  text-transform:uppercase;margin-top:.35rem;
}

/* Tabs */
.auth-tabs{
  display:flex;background:var(--surface-hi);border-radius:var(--r-pill);
  padding:3px;margin-bottom:1.6rem;
}
.auth-tab{
  flex:1;padding:.46rem 0;border-radius:var(--r-pill);border:none;
  cursor:pointer;font-family:'Syne',sans-serif;font-size:.64rem;
  font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:transparent;color:var(--text-2);
  transition:background .25s,color .25s,box-shadow .25s;
}
.auth-tab.on{background:var(--accent);color:#000;box-shadow:0 2px 10px var(--accent-glow)}

/* Form */
.auth-field{margin-bottom:.9rem}
.auth-label{
  display:block;font-size:.64rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;font-family:'Syne',sans-serif;
  color:var(--text-2);margin-bottom:.38rem;
}
.auth-input{
  width:100%;background:var(--surface-hi);border:1px solid var(--border);
  border-radius:10px;padding:.72rem .95rem;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;
  outline:none;
  transition:border-color .22s var(--ease),box-shadow .22s var(--ease),background .22s;
}
.auth-input:focus{
  border-color:var(--border-hi);
  box-shadow:0 0 0 3px var(--accent-dim);
  background:var(--surface);
}
.auth-input::placeholder{color:var(--text-3)}

/* Error */
.auth-error{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.32);
  border-radius:9px;padding:.62rem .9rem;
  font-size:.8rem;color:#fca5a5;margin-bottom:.9rem;
  display:none;line-height:1.5;
}
.auth-error.show{display:block;animation:errIn .25s var(--ease)}
@keyframes errIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* Primary button */
.auth-btn{
  width:100%;padding:.82rem 1rem;
  background:var(--accent);color:#000;border:none;
  border-radius:10px;font-family:'Syne',sans-serif;
  font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;
  box-shadow:0 3px 18px var(--accent-glow);
  transition:opacity .2s,transform .2s,box-shadow .2s;
  display:flex;align-items:center;justify-content:center;gap:.55rem;
  margin-bottom:.75rem;
}
.auth-btn:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 7px 26px var(--accent-glow)}
.auth-btn:active{transform:translateY(0)}
.auth-btn:disabled{opacity:.42;cursor:not-allowed;transform:none}

/* Spinner inside button */
.auth-spin{
  width:14px;height:14px;border:2px solid rgba(0,0,0,.3);
  border-top-color:#000;border-radius:50%;
  animation:spin .7s linear infinite;display:none;flex-shrink:0;
}
.auth-btn.loading .auth-spin{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Divider */
.auth-divider{
  display:flex;align-items:center;gap:.75rem;
  margin:.1rem 0 .75rem;
}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-divider span{
  font-size:.63rem;color:var(--text-3);text-transform:uppercase;
  letter-spacing:.1em;font-family:'Syne',sans-serif;white-space:nowrap;
}

/* Guest button */
.auth-guest{
  width:100%;padding:.74rem 1rem;
  background:transparent;color:var(--text-2);
  border:1px solid var(--border);border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:.84rem;
  cursor:pointer;
  transition:border-color .2s,color .2s,background .2s,transform .2s;
  display:flex;align-items:center;justify-content:center;gap:.55rem;
}
.auth-guest:hover{
  border-color:var(--border-hi);color:var(--text);
  background:var(--surface-hi);transform:translateY(-1px);
}
.auth-guest:disabled{opacity:.38;cursor:not-allowed;transform:none}
.auth-guest-spin{
  width:13px;height:13px;border:2px solid var(--border-hi);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;display:none;flex-shrink:0;
}
.auth-guest.loading .auth-guest-spin{display:block}

/* ══════════════════════════════════════
   APP SCREEN
══════════════════════════════════════ */
#appScreen{
  display:none;
  opacity:0;
  transition:opacity .45s var(--ease);
}
#appScreen.visible{opacity:1}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 1.4rem 6rem}

/* ══════════════════════════════════════
   NAV
══════════════════════════════════════ */
.nav{
  position:sticky;top:0;z-index:900;
  padding:.8rem 0;display:flex;gap:.4rem;
  justify-content:center;align-items:center;flex-wrap:wrap;
}
.nav-bg{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,var(--bg) 65%,transparent);
  pointer-events:none;transition:backdrop-filter .4s,background .5s;
}
.nav.scrolled .nav-bg{
  backdrop-filter:blur(22px) saturate(1.5);
  background:linear-gradient(to bottom,rgba(7,7,7,.82) 80%,transparent);
}
body.light .nav.scrolled .nav-bg{
  background:linear-gradient(to bottom,rgba(245,242,237,.85) 80%,transparent);
}

/* Search */
.s-wrap{position:relative;z-index:1}
.s-inner{
  display:flex;align-items:center;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-pill);padding:0 1rem;
  width:clamp(180px,30vw,360px);
  backdrop-filter:blur(18px);
  transition:border-color .25s var(--ease),box-shadow .25s var(--ease),width .3s var(--ease);
}
.s-inner:focus-within{
  border-color:var(--border-hi);
  box-shadow:0 0 0 3px var(--accent-dim);
  width:clamp(180px,34vw,400px);
}
.s-inner.breathing{animation:breathe 2.4s ease-in-out infinite}
@keyframes breathe{
  0%,100%{box-shadow:0 0 0 3px var(--accent-dim)}
  50%{box-shadow:0 0 0 7px var(--accent-dim),0 0 28px var(--accent-glow)}
}
.s-icon{color:var(--text-2);flex-shrink:0;transition:color .2s}
.s-inner:focus-within .s-icon{color:var(--accent)}
.s-input{
  background:transparent;border:none;outline:none;
  color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:.875rem;padding:.68rem .5rem;width:100%;
}
.s-input::placeholder{color:var(--text-2)}
.s-clear{
  background:none;border:none;cursor:pointer;
  color:var(--text-2);display:flex;align-items:center;
  padding:.2rem;border-radius:50%;opacity:0;pointer-events:none;
  transition:opacity .2s,color .2s,background .2s;flex-shrink:0;
}
.s-clear.on{opacity:1;pointer-events:auto}
.s-clear:hover{color:var(--text);background:var(--border)}
.s-recent{
  position:absolute;top:calc(100% + 9px);left:0;right:0;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;backdrop-filter:blur(24px);
  padding:.4rem;z-index:100;
  opacity:0;transform:translateY(-6px) scale(.98);pointer-events:none;
  transition:opacity .22s var(--ease),transform .22s var(--ease);
  box-shadow:0 12px 40px rgba(0,0,0,.3);
}
.s-recent.on{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.recent-label{font-size:.57rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3);padding:.25rem .55rem .3rem;display:block;font-family:'Syne',sans-serif;font-weight:700}
.recent-row{
  display:flex;align-items:center;gap:.45rem;
  padding:.42rem .55rem;border-radius:8px;cursor:pointer;
  font-size:.82rem;color:var(--text-2);
  transition:background .15s,color .15s;
}
.recent-row:hover{background:var(--surface-hi);color:var(--text)}

/* Nav buttons */
.nav-btn{
  position:relative;z-index:1;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-pill);padding:.46rem .88rem;
  cursor:pointer;color:var(--text-2);display:flex;
  align-items:center;gap:.4rem;font-family:'DM Sans',sans-serif;
  font-size:.78rem;backdrop-filter:blur(16px);
  transition:border-color .2s,color .2s,background .2s;
  white-space:nowrap;
}
.nav-btn:hover{border-color:var(--border-hi);color:var(--text)}
.nav-btn.on{background:var(--accent-dim);border-color:var(--border-hi);color:var(--accent)}
.nbadge{
  background:var(--accent);color:#000;font-weight:700;
  font-size:.59rem;padding:.07rem .36rem;border-radius:var(--r-pill);
  min-width:17px;text-align:center;line-height:1.65;
}

/* User chip */
.user-chip{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:.45rem;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-pill);padding:.38rem .75rem .38rem .48rem;
  backdrop-filter:blur(16px);
  animation:up .3s var(--ease) forwards;
}
.user-avatar{
  width:22px;height:22px;border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:.62rem;font-weight:800;
  color:#000;flex-shrink:0;
}
.user-avatar.guest{
  background:var(--surface-hi);border:1px solid var(--border);
  color:var(--text-2);font-size:.8rem;
}
.user-name{
  font-size:.74rem;color:var(--text-2);
  max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.logout-btn{
  background:none;border:none;cursor:pointer;
  color:var(--text-3);padding:.1rem .05rem;display:flex;
  align-items:center;border-radius:4px;
  transition:color .2s;margin-left:.08rem;
}
.logout-btn:hover{color:var(--danger)}

/* Theme toggle */
.t-toggle{
  position:relative;z-index:1;
  display:flex;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-pill);padding:3px;backdrop-filter:blur(16px);
}
.t-btn{
  padding:.34rem .72rem;border-radius:var(--r-pill);border:none;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:.6rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  background:transparent;color:var(--text-2);
  transition:background .25s,color .25s,box-shadow .25s;
}
.t-btn.on{background:var(--accent);color:#000;box-shadow:0 2px 10px var(--accent-glow)}

/* ══════════════════════════════════════
   HERO
══════════════════════════════════════ */
.hero{text-align:center;padding:3.5rem 0 2rem;overflow:hidden}
.logo-wrap{display:inline-flex;align-items:baseline;max-width:100%}
.logo-text{
  font-family:'Syne',sans-serif;
  font-size:clamp(2.5rem,10vw,7.5rem);
  font-weight:800;line-height:1;letter-spacing:-.04em;
}
.lc{
  display:inline-block;opacity:0;
  transform:translateY(22px) rotateX(-40deg);
  animation:charReveal .5s var(--ease) forwards;
}
@keyframes charReveal{to{opacity:1;transform:translateY(0) rotateX(0)}}
.logo-dot{
  font-family:'Syne',sans-serif;
  font-size:clamp(2.5rem,10vw,7.5rem);
  font-weight:800;color:var(--accent);
  display:inline-block;position:relative;
  opacity:0;animation:dotBoom .6s cubic-bezier(.34,1.56,.64,1) forwards .55s;
}
@keyframes dotBoom{
  0%  {opacity:0;transform:scale(0) rotate(-20deg)}
  60% {opacity:1;transform:scale(1.15) rotate(5deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}
.sring{
  position:absolute;top:50%;left:50%;
  width:22px;height:22px;border:2px solid var(--accent);
  border-radius:50%;opacity:0;pointer-events:none;
  transform:translate(-50%,-50%);
}
.sring.fire{animation:ringX .7s ease-out forwards}
@keyframes ringX{
  0%  {transform:translate(-50%,-50%) scale(.5);opacity:.8}
  100%{transform:translate(-50%,-50%) scale(16);opacity:0}
}
.hero-sub{
  margin-top:.6rem;font-size:.77rem;font-weight:300;
  color:var(--text-2);letter-spacing:.16em;text-transform:uppercase;
  opacity:0;transform:translateY(8px);
  animation:up .6s var(--ease) forwards .9s;
}
@keyframes up{to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════════
   DAILY WORD
══════════════════════════════════════ */
.daily{
  background:linear-gradient(130deg,var(--accent-dim),transparent 70%);
  border:1px solid var(--border-hi);border-radius:18px;
  padding:1.15rem 1.4rem;margin-bottom:1.75rem;
  display:flex;align-items:flex-start;gap:1rem;
  position:relative;overflow:hidden;
  opacity:0;transform:translateY(8px);
  animation:up .5s var(--ease) forwards 1.05s;
  cursor:default;
}
.daily::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:130px;height:130px;
  background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;
}
.daily-badge{
  background:var(--accent);color:#000;font-family:'Syne',sans-serif;
  font-size:.55rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  padding:.26rem .62rem;border-radius:var(--r-pill);flex-shrink:0;align-self:flex-start;margin-top:.14rem;
}
.daily-title{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:800;color:var(--accent);letter-spacing:-.02em;margin-bottom:.2rem}
.daily-mean{font-size:.84rem;color:var(--text-2);font-weight:300;line-height:1.6}

/* ══════════════════════════════════════
   STATS
══════════════════════════════════════ */
.stats{
  display:flex;justify-content:center;gap:2.2rem;
  margin-bottom:1.6rem;flex-wrap:wrap;
  opacity:0;animation:up .5s var(--ease) forwards 1.1s;
}
.stat{text-align:center}
.stat .n{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent)}
.stat .l{font-size:.63rem;color:var(--text-2);text-transform:uppercase;letter-spacing:.1em;margin-top:.06rem}

/* ══════════════════════════════════════
   FILTER BAR
══════════════════════════════════════ */
.filter-bar{
  display:flex;gap:.35rem;margin-bottom:.75rem;flex-wrap:wrap;
  opacity:0;animation:up .5s var(--ease) forwards 1.15s;
}
.fcat{
  padding:.36rem .85rem;border-radius:var(--r-pill);
  border:1px solid var(--border);background:var(--surface);
  color:var(--text-2);font-size:.74rem;cursor:pointer;
  transition:all .2s var(--ease);display:flex;align-items:center;gap:.3rem;
  backdrop-filter:blur(12px);
}
.fcat:hover{color:var(--text);border-color:var(--border-hi)}
.fcat.on{background:var(--accent-dim);border-color:var(--border-hi);color:var(--accent)}
.fcat-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ══════════════════════════════════════
   TABS
══════════════════════════════════════ */
.tabs{
  display:flex;gap:.35rem;margin-bottom:1.6rem;flex-wrap:wrap;
  opacity:0;animation:up .5s var(--ease) forwards 1.2s;
}
.tab{
  padding:.44rem 1rem;border-radius:var(--r-pill);
  border:1px solid var(--border);background:var(--surface);
  color:var(--text-2);font-size:.79rem;cursor:pointer;
  transition:all .2s var(--ease);display:flex;align-items:center;gap:.38rem;
  backdrop-filter:blur(12px);
}
.tab:hover{color:var(--text);border-color:var(--border-hi)}
.tab.on{background:var(--accent-dim);border-color:var(--border-hi);color:var(--accent)}
.tc{background:var(--surface-hi);font-size:.6rem;padding:.06rem .36rem;border-radius:20px;color:var(--text-3);transition:all .2s}
.tab.on .tc{background:var(--accent);color:#000}

/* ══════════════════════════════════════
   GRID
══════════════════════════════════════ */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
  gap:1.1rem;
  opacity:0;animation:up .5s var(--ease) forwards 1.26s;
}
.skel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:1.4rem}
.sk{
  background:linear-gradient(90deg,var(--border) 25%,var(--surface-hi) 50%,var(--border) 75%);
  background-size:200% 100%;border-radius:5px;
  animation:shim 1.6s ease-in-out infinite;
}
@keyframes shim{to{background-position:-200% 0}}
.sk-t{height:24px;width:42%;margin-bottom:.85rem}
.sk-l{height:10px;margin-bottom:.42rem}
.sk-s{height:10px;width:60%}
.sk-d{height:1px;background:var(--border);margin:.9rem 0}
.sk-e{height:10px;width:48%}

/* ══════════════════════════════════════
   CARD
══════════════════════════════════════ */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-card);padding:1.35rem;
  position:relative;overflow:hidden;
  backdrop-filter:blur(14px) saturate(1.3);
  -webkit-backdrop-filter:blur(14px) saturate(1.3);
  transition:transform .38s var(--ease),border-color .38s var(--ease),box-shadow .38s var(--ease);
  opacity:0;transform:translateY(14px);
  animation:cardIn .42s var(--ease) forwards;
  will-change:transform;cursor:default;
  --ch:var(--accent-h);
}
body.light .card{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.07);box-shadow:0 2px 14px rgba(0,0,0,.06)}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at var(--mx,50%) var(--my,50%),hsla(var(--ch),85%,52%,.09) 0%,transparent 65%);
  opacity:0;border-radius:inherit;pointer-events:none;transition:opacity .4s;
}
.card:hover::before{opacity:1}
.card:hover{
  transform:translateY(-5px) scale(1.005);
  border-color:hsla(var(--ch),85%,52%,.45);
  box-shadow:var(--shadow-card),0 0 0 1px hsla(var(--ch),85%,52%,.1),inset 0 1px 0 rgba(255,255,255,.05);
}
.card-line{position:absolute;top:0;left:1.3rem;right:1.3rem;height:1.5px;background:linear-gradient(90deg,transparent,hsl(var(--ch),85%,52%),transparent);opacity:0;transition:opacity .32s}
.card:hover .card-line{opacity:.55}
.card-sheen{position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 50%)}
.ripple{position:absolute;border-radius:50%;pointer-events:none;background:hsla(var(--ch),85%,52%,.14);transform:scale(0);animation:rip .6s ease-out forwards}
@keyframes rip{to{transform:scale(4.5);opacity:0}}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.72rem}
.word{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:hsl(var(--ch),85%,52%);letter-spacing:-.03em;line-height:1;transition:color .3s}
body.light .word{color:hsl(var(--ch),75%,38%)}
.actions{display:flex;gap:.28rem;flex-shrink:0;margin-left:.5rem}
.ab{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all .2s var(--ease)}
.ab:hover{border-color:var(--border-hi);color:var(--text);background:var(--surface-hi)}
.ab.fav-on{color:var(--danger);border-color:rgba(239,68,68,.38);background:rgba(239,68,68,.09)}
.ab.learn-on{color:var(--success);border-color:rgba(34,197,94,.38);background:rgba(34,197,94,.09)}
.ab.copy-ok{color:var(--success);border-color:rgba(34,197,94,.38)}
.meaning{font-size:.88rem;line-height:1.72;font-weight:300;color:var(--text);opacity:.85;margin-bottom:.85rem}
.meaning.clamp{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.expand-btn{background:none;border:none;color:hsl(var(--ch),85%,52%);font-size:.73rem;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif;opacity:.75;transition:opacity .2s;margin-bottom:.72rem;display:none}
.expand-btn:hover{opacity:1}
.expand-btn.show{display:inline}
.cat-badge{display:inline-block;font-size:.55rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:'Syne',sans-serif;padding:.14rem .48rem;border-radius:var(--r-pill);margin-bottom:.55rem;background:hsla(var(--ch),85%,52%,.12);color:hsl(var(--ch),85%,52%);border:1px solid hsla(var(--ch),85%,52%,.22)}
.example{border-top:1px solid var(--border);padding-top:.82rem;margin-top:.1rem}
.ex-label{display:flex;align-items:center;gap:.38rem;font-size:.55rem;text-transform:uppercase;letter-spacing:.12em;font-weight:700;font-family:'Syne',sans-serif;color:hsl(var(--ch),85%,52%);margin-bottom:.38rem}
.ex-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,hsla(var(--ch),85%,52%,.25),transparent)}
.ex-text{font-style:italic;font-size:.82rem;font-weight:300;color:var(--text-2);line-height:1.62}
.ex-text::before{content:'"';color:hsl(var(--ch),85%,52%);font-style:normal}
.ex-text::after{content:'"';color:hsl(var(--ch),85%,52%);font-style:normal}
mark{background:hsla(var(--ch),85%,52%,.15);color:hsl(var(--ch),85%,52%);border-radius:3px;padding:0 2px}

/* ══════════════════════════════════════
   PAGINATION
══════════════════════════════════════ */
.pag-wrap{margin-top:2.5rem}
.pag{display:flex;justify-content:center;align-items:center;gap:.35rem;flex-wrap:wrap}
.pb{min-width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;transition:all .22s var(--ease);display:flex;align-items:center;justify-content:center;padding:0 .5rem;backdrop-filter:blur(10px)}
.pb:hover:not(:disabled){border-color:var(--border-hi);color:var(--text);background:var(--surface-hi);transform:translateY(-1px)}
.pb.cur{background:var(--accent);color:#000;border-color:transparent;box-shadow:0 3px 14px var(--accent-glow)}
.pb:disabled{opacity:.28;cursor:not-allowed;transform:none!important}
.pellipsis{color:var(--text-3);font-size:.85rem;padding:0 .15rem}
.pag-info{text-align:center;margin-top:.7rem;font-size:.7rem;color:var(--text-3)}

/* ══════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════ */
.empty{grid-column:1/-1;text-align:center;padding:4rem 1rem;opacity:0;animation:up .5s var(--ease) forwards}
.empty-icon{width:58px;height:58px;margin:0 auto 1.1rem;background:var(--surface);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-3)}
.empty-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text);opacity:.4;margin-bottom:.28rem}
.empty-sub{font-size:.8rem;color:var(--text-2);font-weight:300}

/* ══════════════════════════════════════
   QUIZ OVERLAY
══════════════════════════════════════ */
.quiz-ov{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.88);backdrop-filter:blur(26px);display:flex;align-items:center;justify-content:center;padding:1.4rem;opacity:0;pointer-events:none;transition:opacity .3s var(--ease)}
.quiz-ov.open{opacity:1;pointer-events:auto}
.quiz-card{background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:2.2rem;width:100%;max-width:520px;position:relative;backdrop-filter:blur(24px);transform:scale(.95) translateY(8px);transition:transform .35s var(--ease);box-shadow:0 40px 80px rgba(0,0,0,.5)}
.quiz-ov.open .quiz-card{transform:scale(1) translateY(0)}
.quiz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.quiz-score-lbl{font-family:'Syne',sans-serif;font-weight:700;color:var(--accent);font-size:.92rem}
.quiz-x{background:var(--surface-hi);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--text-2);display:flex;align-items:center;justify-content:center;transition:color .2s,border-color .2s,background .2s}
.quiz-x:hover{color:var(--text);border-color:var(--border-hi);background:var(--surface)}
.quiz-prog{height:3px;background:var(--surface-hi);border-radius:100px;margin-bottom:2.2rem;overflow:hidden}
.quiz-bar{height:100%;background:var(--accent);border-radius:100px;transition:width .45s var(--ease);box-shadow:0 0 8px var(--accent-glow)}
.quiz-qlabel{font-size:.58rem;text-transform:uppercase;letter-spacing:.13em;color:var(--text-2);margin-bottom:.38rem;font-family:'Syne',sans-serif}
.quiz-word{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,5vw,2.5rem);font-weight:800;color:var(--accent);letter-spacing:-.03em;margin-bottom:1.7rem;line-height:1.1}
.quiz-opts{display:grid;gap:.52rem}
.quiz-opt{background:var(--surface-hi);border:1px solid var(--border);border-radius:12px;padding:.85rem 1.1rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);text-align:left;transition:all .2s var(--ease);line-height:1.5}
.quiz-opt:hover:not([disabled]){border-color:var(--border-hi);background:var(--accent-dim);transform:translateX(3px)}
.quiz-opt.correct{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.5);color:var(--success)}
.quiz-opt.wrong{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.4);color:var(--danger)}
.quiz-opt[disabled]{cursor:not-allowed}
.quiz-foot{display:flex;justify-content:space-between;align-items:center;margin-top:1.3rem}
.quiz-next{background:var(--accent);color:#000;border:none;border-radius:var(--r-pill);padding:.58rem 1.4rem;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:opacity .2s,transform .2s;box-shadow:0 3px 14px var(--accent-glow)}
.quiz-next:hover{opacity:.9;transform:translateY(-1px)}
.quiz-next:disabled{opacity:.28;cursor:not-allowed;transform:none}
.quiz-skip{background:none;border:none;color:var(--text-2);font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:color .2s}
.quiz-skip:hover{color:var(--text)}
.quiz-end{text-align:center;padding:.5rem 0}
.quiz-pct{font-family:'Syne',sans-serif;font-size:4rem;font-weight:800;color:var(--accent);line-height:1}
.quiz-pct-label{font-size:.82rem;color:var(--text-2);margin-bottom:1.9rem;margin-top:.25rem}
.quiz-restart{background:var(--accent);color:#000;border:none;border-radius:var(--r-pill);padding:.72rem 2.2rem;font-family:'Syne',sans-serif;font-size:.76rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:opacity .2s,transform .2s;box-shadow:0 3px 14px var(--accent-glow)}
.quiz-restart:hover{opacity:.9;transform:translateY(-1px)}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-pill);padding:.55rem 1.3rem;font-size:.78rem;color:var(--text);display:flex;align-items:center;gap:.5rem;z-index:3000;backdrop-filter:blur(20px);transition:transform .4s var(--ease),opacity .4s;box-shadow:0 8px 30px rgba(0,0,0,.4);pointer-events:none;opacity:0;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--success);flex-shrink:0}
.toast-dot.off{background:var(--danger)}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
.footer{margin-top:4rem;text-align:center;padding-bottom:2rem;opacity:0;animation:up .5s var(--ease) forwards 1.6s}
.footer p{font-size:.67rem;color:var(--text-3);letter-spacing:.09em}
.footer span{color:var(--accent)}

let authMode = 'login';

  $('tabLogin').classList.toggle('on',    m==='login');

  $('authBtnLabel').textContent = m==='login'?'Giriş Yap':'Kayıt Ol';

function showErr(msg){
  const e=$('authError');
  e.textContent=msg; e.classList.add('show');
}
function hideErr(){ $('authError').classList.remove('show'); }

/* Firebase error code → Turkish */
function fbMsg(code){
  const m={
    'auth/invalid-email':          'Geçersiz e-posta adresi.',
    'auth/user-not-found':         'Bu e-posta ile kayıtlı hesap yok.',
    'auth/wrong-password':         'Şifre hatalı. Tekrar deneyin.',
    'auth/invalid-credential':     'E-posta veya şifre hatalı.',
    'auth/email-already-in-use':   'Bu e-posta zaten kullanımda.',
    'auth/weak-password':          'Şifre en az 6 karakter olmalıdır.',
    'auth/too-many-requests':      'Çok fazla deneme. Lütfen bekleyin.',
    'auth/network-request-failed': 'İnternet bağlantısı hatası.',
    'auth/operation-not-allowed':  'Bu giriş yöntemi etkin değil.',
  };
  return m[code]||'Bir hata oluştu. Tekrar deneyin.';
}

function setBusy(on){
  $('authSubmit').disabled  = on;
  $('guestBtn').disabled    = on;
  $('authSpin').style.display  = on?'block':'none';
  $('authSubmit').classList.toggle('loading',on);
}
function setGuestBusy(on){

  $('guestSpin').style.display = on?'block':'none';

$('authSubmit').addEventListener('click', async ()=>{

/* ═══════════════════════════════════════
   AUTH STATE → SCREEN SWITCH
════════════════════════════════════════ */
onAuthStateChanged(auth, user => {
  const authScr = $('authScreen');
  const appScr  = $('appScreen');
  const chip    = $('userChip');

  if(user){
    // Reset loading states
    setBusy(false);
    setGuestBusy(false);

    // Animate out auth screen
    authScr.classList.add('hiding');
    setTimeout(()=>{ authScr.style.display='none'; }, 520);

    // Show app
    appScr.style.display = 'block';
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{ appScr.classList.add('visible'); });
    });

    // User chip
    chip.style.display = 'flex';
    if(user.isAnonymous){
      $('userAvatar').textContent = '👤';
      $('userAvatar').className   = 'user-avatar guest';
      $('userName').textContent   = 'Misafir';
    } else {
      $('userAvatar').textContent = (user.email||'U')[0].toUpperCase();
      $('userAvatar').className   = 'user-avatar';
      $('userName').textContent   = user.email;
    }

    if(!appReady){ appReady=true; initApp(); }

  } else {
    // Show auth screen again
    authScr.style.display = 'flex';
    authScr.classList.remove('hiding');
    hideErr();
    $('authEmail').value = '';
    $('authPass').value  = '';

    appScr.classList.remove('visible');
    setTimeout(()=>{ appScr.style.display='none'; }, 460);
    chip.style.display = 'none';
    appReady = false;
  }
});

/* ═══════════════════════════════════════
   APP INITIALIZER (runs once after login)
════════════════════════════════════════ */
function initApp(){

  /* Logo */
  const lc=$('logoChars'), f=document.createDocumentFragment();
  'SUREN'.split('').forEach((c,i)=>{
    const s=document.createElement('span');
    s.className='lc'; s.textContent=c;
    s.style.animationDelay=`${.1+i*.09}s`;
    f.appendChild(s);
  });
  lc.appendChild(f);
  setTimeout(()=>{ const sr=$('sring'); if(sr) sr.classList.add('fire'); }, 580);

  /* Scroll nav */
  const navEl=$('nav');
  window.addEventListener('scroll',()=>navEl.classList.toggle('scrolled',scrollY>50),{passive:true});

  /* Mouse glow on cards */
  document.addEventListener('mousemove',e=>{
    const c=e.target.closest('.card'); if(!c) return;
    const r=c.getBoundingClientRect();
    c.style.setProperty('--mx',((e.clientX-r.left)/r.width*100).toFixed(1)+'%');
    c.style.setProperty('--my',((e.clientY-r.top)/r.height*100).toFixed(1)+'%');
  },{passive:true});

  /* Ripple */
  document.addEventListener('click',e=>{
    const c=e.target.closest('.card');
    if(!c||e.target.closest('.ab')||e.target.closest('.expand-btn')) return;
    const r=c.getBoundingClientRect(), rip=document.createElement('span');
    rip.className='ripple';
    const sz=Math.max(r.width,r.height);
    Object.assign(rip.style,{width:sz+'px',height:sz+'px',left:(e.clientX-r.left-sz/2)+'px',top:(e.clientY-r.top-sz/2)+'px'});
    c.appendChild(rip);
    rip.addEventListener('animationend',()=>rip.remove());
  });

  /* Persist helpers */
  const saveFavs    = ()=>localStorage.setItem(LS_F,JSON.stringify([...favs]));
  const saveLrnd    = ()=>localStorage.setItem(LS_L,JSON.stringify([...lrnd]));
  const saveRecents = ()=>localStorage.setItem(LS_R,JSON.stringify(recents));

  /* Animated counter */
  function animNum(el,target){
    const start=parseInt(el.textContent)||0;
    if(start===target) return;
    const diff=target-start,dur=400,t0=performance.now();
    (function step(now){
      const p=Math.min((now-t0)/dur,1);
      el.textContent=Math.round(start+diff*p);
      if(p<1) requestAnimationFrame(step);
    })(performance.now());
  }

  /* Stats */
  function updateStats(showing){
    animNum($('stTotal'),  words.length);
    animNum($('stShow'),   showing);
    animNum($('stLearned'),lrnd.size);
    animNum($('stFavs'),   favs.size);
    $('favBadge').textContent = favs.size;
    $('tcAll').textContent    = words.length;
    $('tcFav').textContent    = favs.size;
    $('tcLearned').textContent= lrnd.size;
  }

  /* Hue helpers */
  const wordHue = w => LETTER_HUES[w[0]?.toUpperCase()]??38;
  const catHue  = c => CAT_HUES[c?.toLowerCase()]??38;

  /* Fuzzy search */
  function score(w,q){
    const wl=w.word.toLowerCase(),ml=w.meaning.toLowerCase();
    if(wl===q) return 10; if(wl.startsWith(q)) return 8;
    if(wl.includes(q)) return 6; if(ml.includes(q)) return 4;
    let i=0; for(const ch of wl+' '+ml){if(ch===q[i])i++;if(i===q.length)return 2;}
    return 0;
  }
  const fuzzy=(arr,q)=>arr.map(w=>({w,s:score(w,q)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.w);

  /* Highlight */
  function hl(str,q){
    if(!q) return str;
    const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return str.replace(new RegExp(`(${e})`,'gi'),'<mark>$1</mark>');
  }

  /* Category filter bar */
  const filterBar=$('filterBar');
  function buildFilterBar(){
    const set=new Set();
    words.forEach(w=>{if(w.category)set.add(w.category.toLowerCase());});
    if(!set.size){filterBar.style.display='none';return;}
    filterBar.style.display='flex'; filterBar.innerHTML='';
    const allBtn=document.createElement('button');
    allBtn.className='fcat on'; allBtn.dataset.cat='all';
    allBtn.innerHTML='<span class="fcat-dot"></span>Tümü';
    filterBar.appendChild(allBtn);
    [...set].forEach(cat=>{
      const b=document.createElement('button');
      b.className='fcat'; b.dataset.cat=cat;
      const hue=catHue(cat);
      b.style.setProperty('--ch',hue);
      b.innerHTML=`<span class="fcat-dot" style="background:hsl(${hue},75%,52%)"></span>${cat[0].toUpperCase()+cat.slice(1)}`;
      filterBar.appendChild(b);
    });
    filterBar.addEventListener('click',e=>{
      const b=e.target.closest('.fcat'); if(!b) return;
      filterBar.querySelectorAll('.fcat').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); activeCategory=b.dataset.cat; page=1; render();
    });
  }

  /* Get filtered words */
  function getWords(){
    let w=words;
    if(view==='favorites') w=w.filter(x=>favs.has(x.word));
    if(view==='learned')   w=w.filter(x=>lrnd.has(x.word));
    if(activeCategory!=='all') w=w.filter(x=>(x.category||'').toLowerCase()===activeCategory);
    if(query) w=fuzzy(w,query);
    return w;
  }

  /* Skeleton */
  const grid=$('grid');
  function renderSkeleton(){
    let h='';
    for(let i=0;i<6;i++)
      h+=`<div class="skel-card"><div class="sk sk-t"></div><div class="sk sk-l" style="width:88%"></div><div class="sk sk-l" style="width:76%"></div><div class="sk sk-s"></div><div class="sk-d"></div><div class="sk sk-e"></div></div>`;
    grid.innerHTML=h;
  }

  /* Render grid */
  function renderGrid(pg,q){
    if(!pg.length){
      const msg=q?`"${q}" için eşleşme bulunamadı.`
        :view==='favorites'?'Henüz favori eklemediniz.':'Henüz öğrenilen kelime yok.';
      grid.innerHTML=`<div class="empty"><div class="empty-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div><p class="empty-title">Sonuç Yok</p><p class="empty-sub">${msg}</p></div>`;
      return;
    }
    const frag=document.createDocumentFragment();
    pg.forEach((w,i)=>{
      const art=document.createElement('article');
      art.className='card'; art.style.animationDelay=`${i*.032}s`;
      const hue=wordHue(w.word); art.style.setProperty('--ch',hue);
      const isFav=favs.has(w.word),isLrnd=lrnd.has(w.word),isLong=w.meaning.length>120;
      const mEsc=w.meaning.replace(/"/g,'&quot;');
      const catHtml=w.category?`<span class="cat-badge">${w.category}</span>`:'';
      art.innerHTML=`
        <div class="card-line"></div><div class="card-sheen"></div>
        <div class="card-head">
          <h2 class="word">${hl(w.word,q)}</h2>
          <div class="actions">
            <button class="ab${isFav?' fav-on':''}" data-a="fav" data-w="${w.word}" title="Favori">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </button>
            <button class="ab${isLrnd?' learn-on':''}" data-a="learn" data-w="${w.word}" title="Öğrendim">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
            </button>
            <button class="ab" data-a="copy" data-w="${w.word}" data-m="${mEsc}" title="Kopyala">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            </button>
          </div>
        </div>
        ${catHtml}
        <p class="meaning${isLong?' clamp':''}">${hl(w.meaning,q)}</p>
        ${isLong?'<button class="expand-btn show">Devamını gör ↓</button>':''}
        <div class="example">
          <span class="ex-label">Örnek</span>
          <p class="ex-text">${w.example||'—'}</p>
        </div>`;
      frag.appendChild(art);
    });
    grid.innerHTML=''; grid.appendChild(frag);
  }

  /* Pagination */
  const pagEl=$('pag'), pagInfo=$('pagInfo');
  function renderPag(total){
    const tp=Math.ceil(total/PER);
    if(tp<=1){pagEl.innerHTML='';pagInfo.textContent='';return;}
    const cp=page,delta=2,range=new Set([1,tp]);
    for(let i=Math.max(2,cp-delta);i<=Math.min(tp-1,cp+delta);i++) range.add(i);
    const sorted=[...range].sort((a,b)=>a-b);
    const frag=document.createDocumentFragment();
    const make=p=>{
      const b=document.createElement('button');
      b.className='pb'+(p===cp?' cur':''); b.textContent=p; b.disabled=p===cp;
      b.addEventListener('click',()=>goPage(p)); return b;
    };
    const dots=()=>{const s=document.createElement('span');s.className='pellipsis';s.textContent='…';return s;};
    const prev=document.createElement('button');
    prev.className='pb'; prev.innerHTML='←'; prev.disabled=cp===1;
    prev.addEventListener('click',()=>goPage(cp-1)); frag.appendChild(prev);
    let last=0;
    for(const p of sorted){if(last&&p-last>1)frag.appendChild(dots());frag.appendChild(make(p));last=p;}
    const next=document.createElement('button');
    next.className='pb'; next.innerHTML='→'; next.disabled=cp===tp;
    next.addEventListener('click',()=>goPage(cp+1)); frag.appendChild(next);
    pagEl.innerHTML=''; pagEl.appendChild(frag);
    pagInfo.textContent=`Sayfa ${cp} / ${tp}  ·  ${total} kelime`;
  }

  function goPage(p){page=p;render();window.scrollTo({top:0,behavior:'smooth'});}

  function render(){
    const w=getWords(),tp=Math.ceil(w.length/PER)||1;
    page=Math.min(page,tp);
    const start=(page-1)*PER;
    renderGrid(w.slice(start,start+PER),query);
    renderPag(w.length); updateStats(w.length);
  }

  /* Daily word */
  function showDaily(){
    if(!words.length) return;
    const d=new Date(),jan=new Date(d.getFullYear(),0,0);
    const day=Math.floor((d-jan)/86400000);
    const w=words[day%words.length];
    $('dailyWord').textContent=w.word; $('dailyMean').textContent=w.meaning;
    $('daily').style.display='flex';
  }

  /* Quiz */
  const quizOv=$('quizOv'),qBody=$('qBody'),qBar=$('qBar'),qScoreLbl=$('qScoreLbl');
  let qs={q:[],i:0,score:0,answered:false};
  function openQuiz(){
    if(words.length<4) return;
    qs={q:[...words].sort(()=>Math.random()-.5).slice(0,10),i:0,score:0,answered:false};
    quizOv.classList.add('open'); renderQ();
  }
  function closeQuiz(){quizOv.classList.remove('open');}
  function renderQ(){
    qBar.style.width=`${(qs.i/qs.q.length)*100}%`;
    qScoreLbl.textContent=`Puan: ${qs.score}`;
    if(qs.i>=qs.q.length){
      const pct=Math.round((qs.score/qs.q.length)*100);
      qBody.innerHTML=`<div class="quiz-end"><div class="quiz-pct">${pct}%</div><p class="quiz-pct-label">${qs.score}/${qs.q.length} doğru</p><button class="quiz-restart" id="qRestart">Tekrar Oyna</button></div>`;
      $('qRestart').addEventListener('click',openQuiz);
      return;
    }
    const cur=qs.q[qs.i];
    const opts=[cur,...words.filter(w=>w.word!==cur.word).sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5);
    qBody.innerHTML=`
      <p class="quiz-qlabel">Bu kelimenin anlamı nedir?</p>
      <div class="quiz-word">${cur.word}</div>
      <div class="quiz-opts">${opts.map(o=>`<button class="quiz-opt" data-correct="${o.word===cur.word}">${o.meaning}</button>`).join('')}</div>
      <div class="quiz-foot">
        <button class="quiz-skip" id="qSkip">Geç</button>
        <button class="quiz-next" id="qNext" disabled>Sonraki →</button>
      </div>`;
    qBody.querySelectorAll('.quiz-opt').forEach(b=>{
      b.addEventListener('click',()=>{
        if(qs.answered) return;
        qs.answered=true;
        const ok=b.dataset.correct==='true';
        if(ok) qs.score++;
        b.classList.add(ok?'correct':'wrong');
        if(!ok) qBody.querySelector('[data-correct="true"]').classList.add('correct');
        qBody.querySelectorAll('.quiz-opt').forEach(x=>x.disabled=true);
        $('qNext').disabled=false;
      });
    });
    const advance=()=>{qs.i++;qs.answered=false;renderQ();};
    $('qNext').addEventListener('click',advance);
    $('qSkip').addEventListener('click',advance);
  }

  /* Recents */
  function addRecent(q){
    if(!q||q.length<2) return;
    recents=[q,...recents.filter(r=>r!==q)].slice(0,5); saveRecents();
  }
  function renderRecents(){
    const sRecent=$('sRecent'),recentList=$('recentList');
    if(!recents.length){sRecent.classList.remove('on');return;}
    recentList.innerHTML=recents.map(r=>`<div class="recent-row" data-q="${r}"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>${r}</div>`).join('');
    recentList.querySelectorAll('.recent-row').forEach(el=>{
      el.addEventListener('click',()=>{$('sInput').value=el.dataset.q;doSearch(el.dataset.q);sRecent.classList.remove('on');});
    });
    sRecent.classList.add('on');
  }

  /* Search */
  const sInner=$('sInner'),sInput=$('sInput'),sClear=$('sClear'),sRecent=$('sRecent');
  function doSearch(q){
    query=q.trim().toLowerCase(); page=1;
    sClear.classList.toggle('on',q.length>0);
    sInner.classList.toggle('breathing',q.length>0);
    render();
  }
  sInput.addEventListener('input',e=>{
    clearTimeout(stimer);
    const q=e.target.value;
    if(!q){doSearch('');return;}
    stimer=setTimeout(()=>{addRecent(q.trim());doSearch(q);},180);
  });
  sInput.addEventListener('focus',()=>{if(recents.length)renderRecents();});
  document.addEventListener('click',e=>{if(!e.target.closest('#sWrap'))sRecent.classList.remove('on');});
  sClear.addEventListener('click',()=>{sInput.value='';doSearch('');sInput.focus();});

  /* Card delegation */
  grid.addEventListener('click',e=>{
    const exp=e.target.closest('.expand-btn');
    if(exp){
      const m=exp.previousElementSibling,was=m.classList.contains('clamp');
      m.classList.toggle('clamp',!was); exp.textContent=was?'Daha az ↑':'Devamını gör ↓'; return;
    }
    const b=e.target.closest('.ab'); if(!b) return;
    const {a,w,m}=b.dataset;
    if(a==='fav'){
      favs.has(w)?favs.delete(w):favs.add(w); saveFavs(); render();
      window.showToast(favs.has(w)?`${w} favorilere eklendi`:`${w} favorilerden çıkarıldı`);
    }
    if(a==='learn'){
      lrnd.has(w)?lrnd.delete(w):lrnd.add(w); saveLrnd(); render();
      window.showToast(lrnd.has(w)?`${w} öğrenildi olarak işaretlendi`:`${w} işareti kaldırıldı`);
    }
    if(a==='copy'){
      navigator.clipboard.writeText(`${w}: ${m}`).then(()=>{
        b.classList.add('copy-ok'); setTimeout(()=>b.classList.remove('copy-ok'),1300);
        window.showToast('Panoya kopyalandı ✓');
      }).catch(()=>window.showToast('Kopyalanamadı',false));
    }
  });

  /* Tabs */
  $('tabs').addEventListener('click',e=>{
    const t=e.target.closest('.tab'); if(!t) return;
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on'); view=t.dataset.view; page=1; render();
  });
  $('favBtn').addEventListener('click',()=>{
    const isOn=view==='favorites',nv=isOn?'all':'favorites';
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.view===nv));
    $('favBtn').classList.toggle('on',!isOn); view=nv; page=1; render();
  });

  /* Quiz controls */
  $('quizBtn').addEventListener('click',openQuiz);
  $('quizClose').addEventListener('click',closeQuiz);
  quizOv.addEventListener('click',e=>{if(e.target===quizOv)closeQuiz();});

  /* Keyboard shortcuts */
  document.addEventListener('keydown',e=>{
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();sInput.focus();sInput.select();return;}
    if(e.key==='Escape'){
      if(quizOv.classList.contains('open')){closeQuiz();return;}
      if(document.activeElement===sInput) sInput.blur();
      return;
    }
    if(quizOv.classList.contains('open')||document.activeElement===sInput) return;
    const w=getWords(),tp=Math.ceil(w.length/PER)||1;
    if(e.key==='ArrowRight'&&page<tp) goPage(page+1);
    if(e.key==='ArrowLeft'&&page>1)   goPage(page-1);
  });

  /* Service Worker */
  const SW=`const C='suren-v1',U='${SRC}';
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.add(U).catch(()=>{})));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{if(e.request.url===U){e.respondWith(fetch(e.request).then(r=>{const cl=r.clone();caches.open(C).then(c=>c.put(e.request,cl));return r;}).catch(()=>caches.match(e.request)));}});`;
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([SW],{type:'application/javascript'}))).catch(()=>{});
  }

  window.addEventListener('offline',()=>window.showToast('Çevrimdışı modda çalışıyor',false));
  window.addEventListener('online', ()=>window.showToast('Bağlantı geri geldi ✓'));

  /* Load words */
  async function load(){
    renderSkeleton();
    const cached=localStorage.getItem(CACHE_KEY);
    if(cached){
      try{
        const d=JSON.parse(cached); words=d.words||[];
        showDaily(); buildFilterBar(); updateStats(words.length); render();
      }catch{}
    }
    try{
      const r=await fetch(SRC), d=await r.json();
      words=d.words||[];
      localStorage.setItem(CACHE_KEY,JSON.stringify(d));
      showDaily(); buildFilterBar(); updateStats(words.length); render();
    }catch{
      if(!words.length)
        grid.innerHTML=`<div class="empty"><div class="empty-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg></div><p class="empty-title">Bağlantı Hatası</p><p class="empty-sub">Lütfen sayfayı yenileyin.</p></div>`;
    }
  }
  load();

} // end initApp
</script>
</body>
</html>
